<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocalFlow Calendar</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="description" content="Privacy-first, offline-capable digital calendar. Zero data leaves your device.">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons (Phosphor) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="theme-dark">
    <!-- App Container -->
    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ph-fill ph-calendar-check"></i>
                    <span>LocalFlow</span>
                </div>
                <div class="privacy-badge" title="Zero data leaves your device">
                    <i class="ph ph-shield-check"></i> Offline
                </div>
                <button class="icon-btn mobile-close" id="btn-mobile-close">
                    <i class="ph ph-x"></i>
                </button>
            </div>

            <div class="clock-container" id="real-time-clock">
                <div class="clock-time" id="clock-time-display">00:00</div>
                <div class="clock-date" id="clock-date-display">Jan 1, 1970</div>
            </div>

            <button class="btn-primary" id="btn-quick-add">
                <i class="ph ph-plus-circle"></i> Add Event / Task
            </button>

            <nav class="sidebar-nav">
                <div class="nav-item active" data-view="month">
                    <i class="ph ph-calendar-blank"></i> Month
                </div>
                <div class="nav-item" data-view="week">
                    <i class="ph ph-columns"></i> Week
                </div>
                <div class="nav-item" data-view="day">
                    <i class="ph ph-list-dashes"></i> Timeline
                </div>
                <div class="nav-item" data-view="agenda">
                    <i class="ph ph-list-numbers"></i> Agenda
                </div>
                <div class="nav-item" id="nav-item-settings">
                    <i class="ph ph-gear"></i> Settings
                </div>
            </nav>

            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Focus Mode</h3>
                    <label class="switch">
                        <input type="checkbox" id="focus-mode-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <p class="section-desc">Hides future dates, shows today & top tasks.</p>
            </div>

            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Alarms</h3>
                    <button class="icon-btn" id="btn-add-alarm"><i class="ph ph-plus"></i></button>
                </div>
                <ul class="alarm-list" id="alarm-list">
                    <!-- Alarms go here -->
                </ul>
            </div>

            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Productivity</h3>
                </div>
                <div id="weekly-productivity-graph"
                    style="display: flex; gap: 4px; height: 40px; align-items: flex-end; margin-top: 10px;">
                    <!-- Rendered via JS -->
                </div>
                <p class="section-desc" style="margin-top: 4px;">Weekly Average: <span id="weekly-avg-score">0</span>%
                </p>
            </div>

            <div class="sidebar-bottom">
                <div class="streak-container">
                    <i class="ph-fill ph-fire streak-icon"></i>
                    <span id="streak-count">0</span> Day Streak
                </div>
                <div class="settings-actions">
                    <button class="icon-btn" id="btn-compliment" title="Get a Compliment/Joke"><i
                            class="ph ph-smiley"></i></button>
                    <button class="icon-btn" id="btn-theme-toggle" title="Toggle Theme"><i
                            class="ph ph-moon"></i></button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="icon-btn mobile-menu-toggle" id="btn-mobile-menu">
                        <i class="ph ph-list"></i>
                    </button>
                    <button class="btn-outline" id="btn-today">Today</button>
                    <div class="date-navigation">
                        <button class="icon-btn" id="btn-prev"><i class="ph ph-caret-left"></i></button>
                        <h2 id="current-view-title">January 2026</h2>
                        <button class="icon-btn" id="btn-next"><i class="ph ph-caret-right"></i></button>
                    </div>
                </div>
                <div class="header-right">
                    <div class="search-bar">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" id="quick-input" placeholder="Type 'Meeting at 3pm'...">
                    </div>
                </div>
            </header>

            <div class="calendar-container" id="calendar-container">
                <!-- Rendered by calendar.js -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Event/Task Detail Modal -->
    <div class="modal-overlay" id="event-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New</h3>
                <button class="icon-btn modal-close" data-modal="event-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <div class="tabs">
                    <button class="tab-btn active" data-type="event">Event</button>
                    <button class="tab-btn" data-type="task">Task</button>
                </div>
                <form id="item-form">
                    <input type="hidden" id="item-id">
                    <input type="hidden" id="item-type" value="event">

                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="item-title" required placeholder="What's happening?">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="item-date" required>
                        </div>
                        <div class="form-group time-group" id="start-time-group">
                            <label>Time</label>
                            <input type="time" id="item-time">
                        </div>
                    </div>

                    <div class="form-group checkbox-group" id="allday-group">
                        <input type="checkbox" id="item-allday">
                        <label for="item-allday">All Day Event</label>
                    </div>

                    <div class="form-group" id="end-time-group">
                        <label>End Time</label>
                        <input type="time" id="item-end-time">
                    </div>

                    <div class="form-group" id="task-extras" style="display:none;">
                        <label>Recurring</label>
                        <select id="item-recurring">
                            <option value="none">None</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-danger" id="btn-delete-item"
                            style="display:none;">Delete</button>
                        <div class="spacer"></div>
                        <button type="submit" class="btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Alarm Setup Modal -->
    <div class="modal-overlay" id="alarm-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Set Alarm</h3>
                <button class="icon-btn modal-close" data-modal="alarm-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="alarm-form">
                    <input type="hidden" id="alarm-id">
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" id="alarm-time" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <input type="text" id="alarm-message" placeholder="Wake up!" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-danger" id="btn-delete-alarm"
                            style="display:none;">Delete</button>
                        <div class="spacer"></div>
                        <button type="submit" class="btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Alarm Trigger Modal -->
    <div class="modal-overlay" id="alarm-trigger-modal" style="z-index: 10000; background: rgba(0,0,0,0.9);">
        <div class="modal-content text-center"
            style="transform: scale(1.1); box-shadow: 0 0 50px rgba(99, 102, 241, 0.4);">
            <i class="ph-fill ph-bell-ringing"
                style="font-size: 4rem; color: var(--accent); animation: shake 0.5s infinite;"></i>
            <h2 id="trigger-time" style="font-size: 3.5rem; margin: 1rem 0; font-variant-numeric: tabular-nums;">12:00
            </h2>
            <p id="trigger-message" style="font-size: 1.5rem; margin-bottom: 2rem;">Alarm</p>
            <div class="trigger-actions" style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn-outline" id="btn-snooze">Snooze 5m</button>
                <button class="btn-primary" id="btn-dismiss">Dismiss</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="icon-btn modal-close" data-modal="settings-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Accent Color</label>
                    <div class="color-picker-group">
                        <input type="color" id="setting-color" value="#6366f1">
                        <span id="color-hex-display">#6366f1</span>
                    </div>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="setting-hourly-chime">
                    <label for="setting-hourly-chime">Hourly Chime (9am - 9pm)</label>
                </div>
                <div class="form-group">
                    <label>Time Format</label>
                    <select id="setting-time-format">
                        <option value="12hr">12-Hour (AM/PM)</option>
                        <option value="24hr">24-Hour</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data Management</label>
                    <button class="btn-outline" id="btn-export" style="width: 100%; margin-bottom: 0.5rem;"><i
                            class="ph ph-download-simple"></i> Export Data (JSON)</button>
                    <button class="btn-outline" id="btn-import" style="width: 100%; margin-bottom: 0.5rem;"><i
                            class="ph ph-upload-simple"></i> Import Data (JSON)</button>
                    <input type="file" id="import-file" style="display:none;" accept=".json">
                    <button class="btn-danger" id="btn-clear-data" style="width: 100%; margin-top: 1rem;"><i
                            class="ph ph-trash"></i> Wipe All Data</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/store.js" defer></script>
    <script src="js/nlp.js" defer></script>
    <script src="js/alarms.js" defer></script>
    <script src="js/tasks.js" defer></script>
    <script src="js/engagement.js" defer></script>
    <script src="js/calendar.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/app.js" defer></script>
</body>

</html>
